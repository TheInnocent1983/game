name: "Godot C# Multi-Stage Pipeline"

on:
  push:
    branches: [ "dev", "main", "release/*" ]

jobs:
  # CLOUD 1: Verify C#
  check-scripts:
    name: "Verify C# Scripts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore & Compile
        run: dotnet build

  # CLOUD 2: Linux Build
  build-linux:
    name: "Build Linux Portable"
    needs: check-scripts
    if: startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Export Linux
        uses: firebelley/godot-export@v5.2.1
        with:
          # Updated to 4.6.1-stable Mono links
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz
          relative_project_path: ./
          export_preset: "Linux"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/

  # CLOUD 3: Windows Build
  build-windows:
    name: "Build Windows Portable"
    needs: check-scripts
    if: startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Export Windows
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz
          relative_project_path: ./
          export_preset: "Windows"
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/
